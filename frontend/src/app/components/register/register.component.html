<div class="login-container">
  <a routerLink="/" class="back-home">
    <svg class="icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
      <polyline points="9 22 9 12 15 12 15 22"></polyline>
    </svg>
    Volver al Inicio
  </a>

  <div class="login-box">
    <div class="login-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      <h2>Crear Cuenta</h2>
      <p>Únete a GamerMood</p>
    </div>

    <form (ngSubmit)="onRegister()">
      <div class="form-group">
        <label for="username">Nombre de usuario</label>
        <input type="text" id="username" [(ngModel)]="username" name="username"
          placeholder="TuNombre" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="email" name="email"
          placeholder="tu@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" [(ngModel)]="password" name="password"
          placeholder="••••••••" required>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar contraseña</label>
        <input type="password" id="confirmPassword" [(ngModel)]="confirmPassword"
          name="confirmPassword" placeholder="••••••••" required>
      </div>

      @if (errorMessage) {
        <p class="error-msg">{{ errorMessage }}</p>
      }

      <button type="submit" class="btn-submit">Crear Cuenta</button>

      <div class="register-link">
        ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
      </div>
    </form>
  </div>
</div>
