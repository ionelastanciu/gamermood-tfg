<div class="login-container">
  <div class="login-box success-box">

    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
    </div>

    <h2 class="success-title">¡Registro completado!</h2>
    <p class="success-subtitle">Tu cuenta ha sido creada con éxito.</p>
    <p class="success-hint">Ya puedes iniciar sesión con tu email y contraseña.</p>

    <a routerLink="/login" class="btn-submit">
      <svg class="icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13.8 12H3"></path>
      </svg>
      Ir al inicio de sesión
    </a>

    <p class="countdown-text">Redirigiendo automáticamente en {{ countdown }} segundos...</p>

  </div>
</div>
