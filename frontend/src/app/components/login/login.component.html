<div class="login-container">
    <a routerLink="/" class="back-home">
        <svg class="icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        Volver al Inicio
    </a>

    <div class="login-box">
        <div class="login-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M6 12h12M12 6v12"></path>
                <rect x="2" y="7" width="20" height="10" rx="2"></rect>
            </svg>
            <h2>Bienvenido de Vuelta</h2>
            <p>Inicia sesión para continuar</p>
        </div>

        <form (ngSubmit)="onLogin()">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit">
                <svg class="icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13.8 12H3"></path>
                </svg>
                Iniciar Sesión
            </button>

            <div class="register-link">
                ¿No tienes cuenta? <span>Regístrate aquí</span>
            </div>
        </form>
    </div>
</div>
