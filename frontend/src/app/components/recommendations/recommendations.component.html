<div class="recommendations-container">
    <a routerLink="/" class="back-home">
        <svg class="icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        Inicio
    </a>

    <div class="recommendations-content">
        <div class="recommendations-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M12 2a10 10 0 1 0 0 20 10 10 0 1 0 0-20z"></path>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                <circle cx="12" cy="17" r="0.5"></circle>
            </svg>
            <h2>Tus Recomendaciones Personalizadas</h2>
            <p>{{moodMessage}}</p>
        </div>

        <div class="recommendations-box">
            <div class="advice-section">
                <h3>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    Consejos para ti
                </h3>
                <ul class="advice-list">
                    <li *ngFor="let advice of adviceList">{{advice}}</li>
                </ul>
            </div>

            <div class="advice-section">
                <h3>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M6 12h12M12 6v12"></path>
                        <rect x="2" y="7" width="20" height="10" rx="2"></rect>
                    </svg>
                    Juegos recomendados para tu estado
                </h3>
                <div class="games-grid">
                    <div class="game-card" *ngFor="let game of gamesList">
                        <h4>{{game.title}}</h4>
                        <div class="game-genre">{{game.genre}}</div>
                        <p>{{game.description}}</p>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn-new-session" routerLink="/session">
            <svg class="icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <polyline points="1 4 1 10 7 10"></polyline>
                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
            </svg>
            Nueva Sesión
        </button>
    </div>
</div>
