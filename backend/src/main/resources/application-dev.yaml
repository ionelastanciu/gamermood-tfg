spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: false

server:
  error:
    include-message: always
    include-stacktrace: on_param

logging:
  level:
    root: INFO
    com.gamermood: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: INFO
