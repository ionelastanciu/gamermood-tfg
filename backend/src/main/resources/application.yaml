spring:
  application:
    name: gamermood-backend

  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gamermood}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_schema: public

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api
  error:
    include-message: never
    include-stacktrace: never

jwt:
  secret: ${JWT_SECRET:gamermood_super_secret_key_2026_minimum_64_chars_secure}
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

groq:
  api-key: ${GROQ_API_KEY:}
  api-url: ${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
  model: ${GROQ_MODEL:llama-3.3-70b-versatile}
  max-tokens: ${GROQ_MAX_TOKENS:500}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.gamermood: INFO
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
